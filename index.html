<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>H. Frank Carey | Digital Curriculum Portal</title>
    <link rel="stylesheet" href="index.css" />
    
    <script src="uv.bundle.js"></script>
    <script src="uv.config.js"></script>
    <script src="search.js"></script>
</head>
<body>
    <div class="flex-center logo-wrapper header-center">
        <img class="logo" src="uv.png" alt="Portal Logo" />
        <h1>H. Frank Carey Student Resources</h1>
    </div>
    <div class="flex-center desc left-margin">
        <p>"Official gateway for digital learning tools and academic research."</p>
    </div>

    <form id="uv-form" class="flex-center">
        <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
        <input id="uv-address" type="text" placeholder="Search District Curriculum..."/>
    </form>
    
    <div class="desc left-margin">
        <p id="uv-error" style="color: #ff5555;"></p>
        <pre id="uv-error-code"></pre>
    </div>

    <footer>
        <div>
            <a href="#">District Home</a> | <a href="#">Student Support</a> | <a href="credits.html">Credits</a>
        </div>
        <span>&copy; 2026 District Education Systems</span>
    </footer>

    <script>
        "use strict";

        // 1. Register the Service Worker immediately
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', {
                    scope: __uv$config.prefix
                }).catch(err => console.error("Worker failed:", err));
            });
        }

        // 2. Handle the Search
        const form = document.getElementById('uv-form');
        const address = document.getElementById('uv-address');
        const searchEngine = document.getElementById('uv-search-engine');
        const errorMsg = document.getElementById('uv-error');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            // Double check if the config loaded
            if (typeof __uv$config === 'undefined') {
                errorMsg.textContent = "Security modules are still initializing. Please refresh in 5 seconds.";
                return;
            }

            try {
                const url = search(address.value, searchEngine.value);
                location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
            } catch (err) {
                errorMsg.textContent = "Could not connect to resource.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
